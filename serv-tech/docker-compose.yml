services:
    db:
        image: postgres:16
        container_name: projet_fil_rouge
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: projet_fil_rouge
        ports:
            - "5437:5432"
        volumes:
            # Données persistantes
            - projet_fil_rouge_data:/var/lib/postgresql/data
            # Scripts d'initialisation (schéma + données)
            - ./initdb:/docker-entrypoint-initdb.d
            # Import COPY via Docker
            - ./data:/data
        restart: unless-stopped

volumes:
    projet_fil_rouge_data:

